<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Julien Mann</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#ffffff;--fg:#000000;--mid:#888888;--light:#eeeeee;
  --rule:rgba(0,0,0,0.15);
  --bebas:'Bebas Neue',sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --serif:'Playfair Display',serif;
}
[data-theme="dark"]{
  --bg:#000000;--fg:#ffffff;--mid:#b0aba0;--light:#111111;
  --rule:rgba(255,255,255,0.15);
}

/* ── CURSOR ── */
#cursor{
  position:fixed;width:12px;height:12px;border-radius:50%;background:var(--fg);
  pointer-events:none;z-index:9999;transform:translate(-50%,-50%);
  transition:width .2s,height .2s;box-shadow:0 0 0 1.5px var(--bg);
}
#cursor-ring{
  position:fixed;width:36px;height:36px;border-radius:50%;
  border:1.5px solid var(--fg);pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);opacity:.6;
  transition:width .3s,height .3s,opacity .3s;
}
body.cursor-hover #cursor{width:6px;height:6px;}
body.cursor-hover #cursor-ring{width:52px;height:52px;opacity:.3;}

/* ── NOISE ── */
#noise{
  position:fixed;inset:0;z-index:9990;pointer-events:none;opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-repeat:repeat;background-size:128px;
}

/* ── GLOBAL ── */
html{cursor:none;}
body{
  background:var(--bg);color:var(--fg);
  font-family:var(--mono);font-weight:300;
  font-size:14px;line-height:1.7;
  overflow-x:hidden;
  min-height:100vh;
}
::selection{background:var(--fg);color:var(--bg);}
a{color:inherit;text-decoration:none;}
hr{border:none;border-top:1px solid var(--rule);margin:0;}

/* ── BACK BUTTON ── */
.back-btn{
  position:fixed;top:2rem;left:2.5rem;z-index:500;
  font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;
  font-family:var(--mono);
  border:1px solid var(--rule);
  padding:.55rem 1.4rem;
  color:var(--mid);
  background:transparent;
  transition:color .25s,border-color .25s;
  cursor:none;
  display:flex;align-items:center;gap:.6rem;
}
.back-btn::before{content:'←';}
.back-btn:hover{color:var(--fg);border-color:var(--fg);}

/* ── PAGE LAYOUT ── */
.page{
  min-height:100vh;
  display:flex;flex-direction:column;
  justify-content:center;
  padding:8rem 6rem 4rem;
  max-width:1600px;margin:0 auto;
}

/* ── SECTION HEADER ── */
.section-header{
  display:flex;justify-content:space-between;align-items:baseline;
  padding-bottom:1rem;margin-bottom:0;
}
.section-label{font-size:.65rem;letter-spacing:.28em;text-transform:uppercase;color:var(--mid);}
.section-num{font-family:var(--bebas);font-size:1rem;letter-spacing:.1em;color:var(--mid);}

/* ── CONTACT ── */
.contact-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:0;margin-top:0;
}
.contact-left{
  padding:2.5rem 3rem 2.5rem 0;
  border-right:1px solid var(--rule);
}
.contact-right{padding:2.5rem 0 2.5rem 3rem;}
.contact-headline{
  font-family:var(--bebas);
  font-size:clamp(3rem,6vw,6rem);
  line-height:.95;margin-bottom:3rem;
}
.contact-meta-row{
  display:flex;justify-content:space-between;
  padding:1.2rem 0;border-bottom:1px solid var(--rule);
  font-size:.72rem;
}
.contact-meta-row:first-of-type{border-top:1px solid var(--rule);}
.contact-meta-key{letter-spacing:.18em;text-transform:uppercase;color:var(--mid);}
.contact-meta-val{color:var(--fg);text-align:right;}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-bottom:1.2rem;}
.form-group{display:flex;flex-direction:column;gap:.5rem;}
.form-group.full{grid-column:1/-1;}
.form-label{font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:var(--mid);}
.form-input,.form-textarea{
  background:transparent;border:none;border-bottom:1px solid var(--rule);
  color:var(--fg);font-family:var(--mono);font-size:.82rem;font-weight:300;
  padding:.6rem 0;outline:none;transition:border-color .25s;width:100%;
}
.form-input:focus,.form-textarea:focus{border-bottom-color:var(--fg);}
.form-textarea{resize:none;height:100px;}
.form-submit{
  margin-top:2rem;
  font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;
  border:1px solid var(--fg);padding:.75rem 2.5rem;
  background:transparent;color:var(--fg);
  font-family:var(--mono);cursor:none;
  transition:background .25s,color .25s;
}
.form-submit:hover{background:var(--fg);color:var(--bg);}
.form-note{margin-top:1rem;font-size:.62rem;letter-spacing:.12em;color:var(--mid);}

/* ── FOOTER ── */
#footer{
  border-top:1px solid var(--rule);
  padding:2rem 3rem;
  display:flex;justify-content:space-between;align-items:center;
  max-width:1600px;margin:0 auto;
}
.footer-copy{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--mid);}
.footer-links{display:flex;gap:2rem;list-style:none;}
.footer-links a{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--mid);transition:color .25s;}
.footer-links a:hover{color:var(--fg);}

@media(max-width:768px){
  .page{padding:6rem 1.5rem 3rem;}
  .contact-grid{grid-template-columns:1fr;}
  .contact-left{border-right:none;border-bottom:1px solid var(--rule);padding:2rem 0;}
  .contact-right{padding:2rem 0;}
  .form-row{grid-template-columns:1fr;}
  #footer{flex-direction:column;gap:1.5rem;padding:2rem 1.5rem;}
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>


  <div class="contact-grid">
    <div class="contact-left">
      <div class="contact-headline">LET'S<br>TALK</div>
      <div class="contact-meta-row">
        <span class="contact-meta-key">Status</span>
        <span class="contact-meta-val">Open to opportunities</span>
      </div>
      <div class="contact-meta-row">
        <span class="contact-meta-key">Based in</span>
        <span class="contact-meta-val">Your City, Country</span>
      </div>
      <div class="contact-meta-row">
        <span class="contact-meta-key">Response Time</span>
        <span class="contact-meta-val">Within 24 hours</span>
      </div>
      <div class="contact-meta-row">
        <span class="contact-meta-key">LinkedIn</span>
        <span class="contact-meta-val">linkedin.com/in/julienmann</span>
      </div>
    </div>
    <div class="contact-right">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input class="form-input" type="text" placeholder="Jane">
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input class="form-input" type="text" placeholder="Smith">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group full">
          <label class="form-label">Email Address</label>
          <input class="form-input" type="email" placeholder="jane@example.com">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group full">
          <label class="form-label">Message</label>
          <textarea class="form-textarea" placeholder="Tell me about your project or opportunity…"></textarea>
        </div>
      </div>
      <button class="form-submit">Send Message</button>
      <p class="form-note">All messages answered personally.</p>
    </div>
  </div>
</main>

<hr>

<footer>
  <div id="footer">
    <span class="footer-copy">© 2025 Julien Mann. All rights reserved.</span>
    <ul class="footer-links">
      <li><a href="#">GitHub</a></li>
      <li><a href="#">LinkedIn</a></li>
      <li><a href="#">Twitter / X</a></li>
    </ul>
  </div>
</footer>

<script>
const cur=document.getElementById('cursor');
const ring=document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;
  cur.style.left=mx+'px';cur.style.top=my+'px';
});
function animRing(){
  rx+=(mx-rx)*.12;ry+=(my-ry)*.12;
  ring.style.left=rx+'px';ring.style.top=ry+'px';
  requestAnimationFrame(animRing);
}
animRing();
document.querySelectorAll('a,button').forEach(el=>{
  el.addEventListener('mouseenter',()=>document.body.classList.add('cursor-hover'));
  el.addEventListener('mouseleave',()=>document.body.classList.remove('cursor-hover'));
});
</script>
</body>
</html>
