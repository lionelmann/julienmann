<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>70.3 Training Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --orange:#FC4C02;
  --orange-dim:rgba(252,76,2,.1);
  --bg:#F5F5F5;
  --card:#FFFFFF;
  --fg:#242428;
  --mid:#6D6D6D;
  --border:#E8E8E8;
  --blue:#4A90D9;
  --blue-dim:rgba(74,144,217,.1);
  --teal:#00B4D8;
  --teal-dim:rgba(0,180,216,.1);
  --purple:#8B5CF6;
  --purple-dim:rgba(139,92,246,.1);
  --green:#27AE60;
  --green-dim:rgba(39,174,96,.1);
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.08);
  --radius:10px;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--fg);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;}

/* ── TOPNAV ── */
.topnav{background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;}
.topnav-inner{max-width:1100px;margin:0 auto;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:48px;}
.topnav-back{font-size:.75rem;font-weight:500;color:var(--mid);display:flex;align-items:center;gap:.3rem;transition:color .15s;}
.topnav-back:hover{color:var(--fg);}
.topnav-race{font-size:.72rem;font-weight:700;color:var(--orange);letter-spacing:.015em;}

/* ── PAGE ── */
.page{max-width:1100px;margin:0 auto;padding:1.5rem 2rem 4rem;}

/* ── RACE HEADER ── */
.race-hdr{display:flex;align-items:center;justify-content:space-between;padding:.75rem 0 1.1rem;flex-wrap:wrap;gap:.6rem;}
.race-hdr-left{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;}
.race-name{font-size:.95rem;font-weight:700;}
.phase-pill{font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:.22rem .7rem;border-radius:99px;white-space:nowrap;}
.race-hdr-right{font-size:.72rem;color:var(--mid);}

/* ── PROGRESS ── */
.prog-wrap{height:3px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:1.5rem;}
.prog-fill{height:100%;background:var(--orange);border-radius:99px;transition:width .8s cubic-bezier(.4,0,.2,1);}

/* ── HERO ── */
.hero{margin-bottom:1.25rem;}

/* Pre-training hero */
.pretrain-card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-md);
  padding:2.25rem 2.5rem;display:grid;grid-template-columns:200px 1fr;gap:0;align-items:stretch;
  overflow:hidden;
}
.pretrain-left{padding-right:2.5rem;border-right:1px solid var(--border);}
.pretrain-eyebrow{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mid);margin-bottom:.5rem;}
.pretrain-num{font-size:8rem;font-weight:800;color:var(--orange);letter-spacing:-.05em;line-height:.85;display:block;}
.pretrain-unit{font-size:1rem;font-weight:700;color:var(--fg);margin-top:.5rem;display:block;}
.pretrain-date{font-size:.78rem;color:var(--mid);margin-top:.3rem;}
.pretrain-right{padding-left:2.5rem;display:flex;flex-direction:column;justify-content:space-between;gap:1.25rem;}
.pretrain-phase-name{font-size:1rem;font-weight:700;margin-bottom:.15rem;}
.pretrain-phase-sub{font-size:.75rem;color:var(--mid);line-height:1.6;}
.pretrain-week-preview{display:flex;flex-direction:column;gap:.38rem;}
.preview-row{display:flex;align-items:center;gap:.7rem;}
.preview-day{font-size:.65rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--mid);width:2.2rem;flex-shrink:0;}
.preview-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.preview-label{font-size:.72rem;color:var(--fg);}
.preview-dur{font-size:.65rem;color:var(--mid);margin-left:auto;}

/* Active training hero */
.active-card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-md);
  padding:2rem 2.5rem;display:grid;grid-template-columns:1fr auto;gap:2rem;align-items:center;
}
.active-eyebrow{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mid);margin-bottom:.6rem;}
.active-badge{display:inline-block;font-size:2.75rem;font-weight:800;letter-spacing:-.02em;line-height:1;padding:.2rem .5rem;border-radius:6px;margin-bottom:.7rem;}
.active-session{font-size:1.1rem;font-weight:600;margin-bottom:.35rem;}
.active-meta{font-size:.75rem;color:var(--mid);}
.active-meta span+span::before{content:'·';margin:0 .4rem;}
.active-right{text-align:right;}
.active-duration{font-size:2.8rem;font-weight:800;letter-spacing:-.03em;line-height:1;}
.active-dur-label{font-size:.65rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--mid);margin-top:.2rem;}

/* ── PHASE TIMELINE ── */
.timeline-wrap{margin-bottom:1.25rem;}
.timeline-label-row{display:grid;grid-template-columns:10fr 12fr 12fr 12fr 6fr 3fr;margin-bottom:.25rem;}
.timeline-seg-label{font-size:.58rem;font-weight:600;color:var(--mid);text-align:center;letter-spacing:.03em;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding:0 2px;}
.timeline-bar{display:grid;grid-template-columns:10fr 12fr 12fr 12fr 6fr 3fr;border-radius:6px;overflow:hidden;height:8px;}
.tseg{transition:filter .15s;}
.tseg.t-active{filter:brightness(1.15);}

/* ── SECTION HEADER ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
.sec-title{font-size:.8rem;font-weight:700;}
.sec-meta{font-size:.7rem;color:var(--mid);}

/* ── WEEK STRIP ── */
.week-section{margin-bottom:1.25rem;}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.5rem;}
.day-cell{
  background:var(--card);border-radius:8px;box-shadow:var(--shadow);
  padding:.7rem .4rem .6rem;text-align:center;display:flex;flex-direction:column;
  align-items:center;gap:.28rem;border:2px solid transparent;transition:border-color .15s;
}
.day-cell.is-today{border-color:var(--orange);}
.day-cell.is-past{opacity:.4;}
.day-cell.pretrain-day{opacity:.35;}
.day-name-lbl{font-size:.58rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--mid);}
.day-num-lbl{font-size:.75rem;font-weight:600;color:var(--fg);}
.day-sport-badge{font-size:.56rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:.16em .48em;border-radius:3px;white-space:nowrap;}
.day-session-lbl{font-size:.6rem;color:var(--mid);max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3;}

/* ── CALENDAR ── */
.cal-section{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.5rem;}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;}
.cal-month-name{font-size:.88rem;font-weight:700;}
.cal-nav-btns{display:flex;gap:.3rem;}
.cal-nav-btn{
  width:28px;height:28px;border:1.5px solid var(--border);color:var(--mid);
  border-radius:5px;display:flex;align-items:center;justify-content:center;
  font-size:.8rem;transition:all .15s;
}
.cal-nav-btn:hover{border-color:var(--fg);color:var(--fg);}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:.4rem;}
.cal-dow{font-size:.58rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--mid);text-align:center;padding:.3rem 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day{
  min-height:54px;border-radius:5px;padding:.4rem .3rem .35rem;
  position:relative;cursor:default;transition:background .1s;
}
.cal-day.has-act{cursor:pointer;}
.cal-day.has-act:hover{background:var(--bg);}
.cal-day.other-mo .cal-day-num{color:var(--border);}
.cal-day.other-mo .cal-dot{opacity:.3;}
.cal-day.is-today{outline:2px solid var(--orange);outline-offset:-2px;border-radius:5px;}
.cal-day.is-pretrain{opacity:.5;}
.cal-day-num{font-size:.68rem;font-weight:600;display:block;margin-bottom:.2rem;line-height:1;}
.cal-dot{width:7px;height:7px;border-radius:50%;margin:0 auto 2px;}
.cal-dur{font-size:.55rem;color:var(--mid);text-align:center;display:block;line-height:1.3;}
.cal-flag{position:absolute;top:2px;right:3px;font-size:.6rem;line-height:1;}
.cal-tip{
  position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);
  background:var(--fg);color:#fff;font-size:.65rem;font-weight:500;
  padding:.35rem .6rem;border-radius:4px;white-space:nowrap;z-index:50;
  pointer-events:none;opacity:0;transition:opacity .12s;
}
.cal-day:hover .cal-tip{opacity:1;}

/* Legend */
.cal-legend{display:flex;gap:1.25rem;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:.35rem;font-size:.65rem;color:var(--mid);}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── RESPONSIVE ── */
@media(max-width:760px){
  .page{padding:1rem 1rem 3rem;}
  .week-grid{gap:.3rem;}
  .day-session-lbl{display:none;}
  .timeline-label-row,.timeline-bar{display:none;}
}
@media(max-width:600px){
  .pretrain-card{grid-template-columns:1fr;gap:0;}
  .pretrain-left{padding-right:0;border-right:none;border-bottom:1px solid var(--border);padding-bottom:1.5rem;margin-bottom:1.5rem;}
  .pretrain-right{padding-left:0;}
  .pretrain-num{font-size:5rem;}
  .active-card{grid-template-columns:1fr;gap:1rem;}
  .active-right{text-align:left;}
}
@media(max-width:480px){
  .race-hdr-right{display:none;}
}
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-inner">
    <a href="../" class="topnav-back">← julienmann.ca</a>
    <span class="topnav-race" id="nav-race"></span>
  </div>
</nav>

<main class="page">
  <div class="race-hdr">
    <div class="race-hdr-left">
      <span class="race-name">70.3 Half-Ironman · Montréal</span>
      <span class="phase-pill" id="phase-pill"></span>
    </div>
    <span class="race-hdr-right" id="race-hdr-right"></span>
  </div>

  <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

  <section class="hero" id="hero"></section>

  <div class="timeline-wrap" id="timeline-wrap"></div>

  <section class="week-section">
    <div class="sec-hdr">
      <span class="sec-title" id="week-title">This Week</span>
      <span class="sec-meta" id="week-meta"></span>
    </div>
    <div class="week-grid" id="week-grid"></div>
  </section>

  <section class="cal-section">
    <div class="cal-hdr">
      <span class="cal-month-name" id="cal-month-name"></span>
      <div class="cal-nav-btns">
        <button class="cal-nav-btn" id="cal-prev" aria-label="Previous month">‹</button>
        <button class="cal-nav-btn" id="cal-next" aria-label="Next month">›</button>
      </div>
    </div>
    <div class="cal-dow-row">
      <div class="cal-dow">Mon</div><div class="cal-dow">Tue</div>
      <div class="cal-dow">Wed</div><div class="cal-dow">Thu</div>
      <div class="cal-dow">Fri</div><div class="cal-dow">Sat</div>
      <div class="cal-dow">Sun</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-legend" id="cal-legend"></div>
  </section>
</main>

<script>
// ─────────────────────────────────────────────
//  TRAINING PLAN DATA
// ─────────────────────────────────────────────

const TRAIN_START = new Date('2026-06-12T00:00:00');
const RACE_DATE   = new Date('2027-07-05T00:00:00');

// Phase date ranges (authoritative)
const PHASES = [
  { id:1, name:'Foundation',    start:'2026-06-12', end:'2026-08-20', color:'#FC4C02', hrs:'5–7 hrs/wk' },
  { id:2, name:'Base Building', start:'2026-08-21', end:'2026-11-12', color:'#E97316', hrs:'7–9 hrs/wk' },
  { id:3, name:'Build I',       start:'2026-11-13', end:'2027-02-04', color:'#D97706', hrs:'8–10 hrs/wk' },
  { id:4, name:'Build II',      start:'2027-02-05', end:'2027-04-29', color:'#B45309', hrs:'9–11 hrs/wk' },
  { id:5, name:'Peak',          start:'2027-04-30', end:'2027-06-10', color:'#92400E', hrs:'9–10 hrs/wk' },
  { id:6, name:'Taper',         start:'2027-06-11', end:'2027-07-05', color:'#78350F', hrs:'3–7 hrs/wk' },
];

// Hard-coded race/event dates
const RACE_EVENTS = {
  '2026-10-17': { type:'race', label:'Sprint Triathlon', duration:90 },
  '2027-04-12': { type:'race', label:'Olympic Triathlon', duration:150 },
  '2027-07-05': { type:'race', label:'70.3 Half-Ironman', duration:360 },
};

// Pre-race easy days (Jun 30 – Jul 4)
const PRE_RACE_WEEK = {
  0: ['swim', 'Easy swim + drills', 30],
  1: ['brick','Opener brick', 45],
  2: ['swim', 'Activation swim', 20],
  3: ['run',  'Easy jog + strides', 20],
  4: ['rest', 'Rest — prep gear', 0],
  5: ['rest', 'Rest — visualize', 0],
  6: ['rest', 'Rest Day', 0],
};

// Sprint/Olympic tri weeks: Mon of that week
const SPRINT_TRI_WEEK_MON  = new Date('2026-10-12T00:00:00');
const OLYMPIC_TRI_WEEK_MON = new Date('2027-04-07T00:00:00');
const PRE_RACE_WEEK_MON    = new Date('2027-06-30T00:00:00');
const RACE_WEEK_MON        = new Date('2027-07-05T00:00:00'); // Mon Jul 5 = race day

// Sport styling
const SPORT_CFG = {
  rest:  { color:'#9CA3AF', dim:'rgba(156,163,175,.13)', label:'Rest',   badge:'REST'  },
  swim:  { color:'#00B4D8', dim:'rgba(0,180,216,.12)',   label:'Swim',   badge:'SWIM'  },
  run:   { color:'#FC4C02', dim:'rgba(252,76,2,.12)',    label:'Run',    badge:'RUN'   },
  bike:  { color:'#4A90D9', dim:'rgba(74,144,217,.12)',  label:'Bike',   badge:'BIKE'  },
  brick: { color:'#8B5CF6', dim:'rgba(139,92,246,.12)', label:'Brick',  badge:'BRICK' },
  race:  { color:'#FC4C02', dim:'rgba(252,76,2,.18)',    label:'Race',   badge:'RACE'  },
};

// ─── Week template functions ───────────────────
// Returns array[7] of [type, label, duration_min] for Mon-Sun

function weekTemplate(phaseId, weekInPhase, isRecovery) {
  const alt = weekInPhase % 2 === 0;

  if (phaseId === 1) {
    if (isRecovery) return [
      ['rest','Rest Day',0],['swim','Easy swim',30],['run','Easy run',30],
      ['rest','Rest Day',0],['bike','Easy spin',35],
      alt ? ['run','Easy long run',55] : ['bike','Easy ride',60],['rest','Rest Day',0],
    ];
    return [
      ['rest','Rest Day',0],['swim','Technique swim',45],['run','Easy run',40],
      ['swim','Endurance swim',45],['bike','Easy spin',50],
      alt ? ['run','Long run',75] : ['bike','Long ride',80],
      alt ? ['bike','Easy spin',35] : ['run','Recovery run',35],
    ];
  }

  if (phaseId === 2) {
    if (isRecovery) return [
      ['rest','Rest Day',0],['swim','Easy swim',40],['run','Easy run',35],
      ['rest','Rest Day',0],['bike','Easy spin',40],['bike','Moderate ride',75],['run','Short run',30],
    ];
    return [
      ['rest','Rest Day',0],['swim','CSS intervals',55],['run','Tempo run',50],
      ['swim','Swim + easy bike',75],['run','Easy run',40],
      ['bike','Long ride', alt ? 130 : 110],['brick','Bike + Run brick',90],
    ];
  }

  if (phaseId === 3) {
    if (isRecovery) return [
      ['rest','Rest Day',0],['swim','Easy swim',40],['run','Easy run',40],
      ['swim','CSS intervals',55],['rest','Rest Day',0],
      ['bike','Easy ride',90],['run','Easy long run',70],
    ];
    return [
      ['rest','Rest Day',0],['bike','Sweet spot intervals',70],['run','Tempo + strength',60],
      ['swim','CSS intervals',60],['run','Easy run',40],
      ['bike','Long ride',160],
      alt ? ['brick','Long brick',110] : ['run','Long run 18km',110],
    ];
  }

  if (phaseId === 4) {
    if (isRecovery) return [
      ['rest','Rest Day',0],['swim','Easy swim',40],['run','Easy run',40],
      ['rest','Rest Day',0],['swim','Easy swim',40],['bike','Easy ride',90],['run','Easy run',50],
    ];
    return [
      ['rest','Rest Day',0],['brick','Bike intervals + short run',85],['swim','Race-pace swim',80],
      ['run','Race-pace run',60],['swim','Easy technique swim',50],
      ['bike','Long race-pace ride',180],
      alt ? ['brick','Race-sim brick',130] : ['run','Long run 20km',120],
    ];
  }

  if (phaseId === 5) {
    if (isRecovery) return [
      ['rest','Rest Day',0],['swim','Easy swim',40],['run','Easy run',35],
      ['swim','Easy swim',40],['rest','Rest Day',0],['bike','Easy ride',75],['run','Easy run',40],
    ];
    return [
      ['rest','Rest Day',0],['swim','Race-pace swim',55],['bike','Quality ride',75],
      ['run','Race-pace run',60],['swim','Easy swim',45],
      ['bike', weekInPhase <= 3 ? 'Long ride 90km' : 'Moderate ride', weekInPhase <= 3 ? 150 : 90],
      alt ? ['brick','Confidence brick',110] : ['run','Long run',100],
    ];
  }

  // Phase 6 — Taper
  if (weekInPhase <= 1) return [
    ['rest','Rest Day',0],['swim','Taper swim 2000m',50],['bike','Easy spin',45],
    ['run','Easy run 12km',70],['swim','Easy swim',40],['run','Moderate run 8km',50],['run','Easy run 5km',30],
  ];
  if (weekInPhase <= 2) return [
    ['rest','Rest Day',0],['swim','Short swim 1800m',45],['bike','Easy ride',60],
    ['run','Easy run 10km',60],['swim','Easy swim',35],['bike','Easy spin',30],['run','Short run 6km',40],
  ];
  // Week 3 of taper handled by PRE_RACE_WEEK override below
  return [['rest','Rest Day',0],['rest','Rest Day',0],['rest','Rest Day',0],['rest','Rest Day',0],['rest','Rest Day',0],['rest','Rest Day',0],['rest','Rest Day',0]];
}

// Special event weeks (Sprint tri, Olympic tri)
const SPRINT_TRI_TMPL = [
  ['rest','Rest Day',0],['swim','Easy swim',30],['bike','Easy spin',30],
  ['run','Easy run + strides',25],['rest','Rest Day',0],['race','Sprint Triathlon',90],['rest','Recovery',0],
];
const OLYMPIC_TRI_TMPL = [
  ['rest','Rest Day',0],['swim','Easy swim',30],['bike','Easy spin',30],
  ['run','Easy run + strides',20],['rest','Rest Day',0],['race','Olympic Triathlon',150],['rest','Recovery',0],
];

// ─── Core lookup ──────────────────────────────

function dateStr(d) { return d.toISOString().slice(0,10); }
function startOfDay(d) { const x=new Date(d); x.setHours(0,0,0,0); return x; }
function addDays(d,n) { const x=startOfDay(d); x.setDate(x.getDate()+n); return x; }
function mondayOf(d) {
  const x=startOfDay(d);
  const dow=(x.getDay()+6)%7; // 0=Mon
  x.setDate(x.getDate()-dow);
  return x;
}
function dayOfWeek(d) { return (startOfDay(d).getDay()+6)%7; } // 0=Mon

function getPhaseForDate(d) {
  const ds=dateStr(d);
  for (const p of PHASES) if (ds >= p.start && ds <= p.end) return p;
  return null;
}

function getWeekInPhase(d, phase) {
  const psStart = startOfDay(new Date(phase.start));
  const psMon   = mondayOf(psStart);
  return Math.floor((startOfDay(d) - psMon) / (7*86400000)) + 1;
}

function getActivity(d) {
  const today = startOfDay(d);
  const ds = dateStr(today);

  if (today < TRAIN_START) return null;
  if (today > RACE_DATE)   return null;

  // Hard-coded event dates
  if (RACE_EVENTS[ds]) {
    const e = RACE_EVENTS[ds];
    return { type:e.type, label:e.label, duration:e.duration };
  }

  // Pre-race week (Jun 30–Jul 4)
  const preRaceMon = startOfDay(PRE_RACE_WEEK_MON);
  if (today >= preRaceMon && today < RACE_DATE) {
    const dow = dayOfWeek(today);
    const [type,label,duration] = PRE_RACE_WEEK[dow] || ['rest','Rest Day',0];
    return { type, label, duration };
  }

  // Sprint tri week
  const stMon = startOfDay(SPRINT_TRI_WEEK_MON);
  if (today >= stMon && today < addDays(stMon,7)) {
    const [type,label,duration] = SPRINT_TRI_TMPL[dayOfWeek(today)];
    return { type, label, duration };
  }

  // Olympic tri week
  const otMon = startOfDay(OLYMPIC_TRI_WEEK_MON);
  if (today >= otMon && today < addDays(otMon,7)) {
    const [type,label,duration] = OLYMPIC_TRI_TMPL[dayOfWeek(today)];
    return { type, label, duration };
  }

  const phase = getPhaseForDate(today);
  if (!phase) return null;

  const wip  = getWeekInPhase(today, phase);
  const isRec = (wip % 4 === 0);
  const dow   = dayOfWeek(today);
  const tmpl  = weekTemplate(phase.id, wip, isRec);
  const [type,label,duration] = tmpl[dow] || ['rest','Rest Day',0];
  return { type, label, duration };
}

// ─── Utility ──────────────────────────────────

function fmtDuration(min) {
  if (!min || min <= 0) return null;
  const h=Math.floor(min/60), m=min%60;
  if (h>0&&m>0) return `${h}h ${m}m`;
  if (h>0) return `${h}h`;
  return `${m} min`;
}

function fmtDate(d,opts={month:'short',day:'numeric'}) {
  return d.toLocaleDateString('en-CA',opts);
}

function fmtMonthYear(d) {
  return d.toLocaleDateString('en-CA',{month:'long',year:'numeric'});
}

function daysUntil(target) {
  return Math.ceil((startOfDay(target) - startOfDay(new Date())) / 86400000);
}

// ─── RENDER ───────────────────────────────────

const today = startOfDay(new Date());
let calYear  = today.getFullYear();
let calMonth = today.getMonth();

function sportStyle(type) {
  return SPORT_CFG[type] || SPORT_CFG.rest;
}

function renderNav() {
  const d = daysUntil(RACE_DATE);
  document.getElementById('nav-race').textContent =
    d > 0 ? `🏁 Race in ${d} days` : d === 0 ? '🏁 RACE DAY' : '🏁 Race complete';
}

function renderRaceHeader() {
  const phase = getPhaseForDate(today);
  const pill  = document.getElementById('phase-pill');
  const right = document.getElementById('race-hdr-right');

  if (today < TRAIN_START) {
    const d = daysUntil(TRAIN_START);
    pill.textContent = 'Pre-Training';
    pill.style.background = 'rgba(156,163,175,.15)';
    pill.style.color = '#6D6D6D';
    right.textContent = `Training starts ${fmtDate(TRAIN_START,{month:'long',day:'numeric',year:'numeric'})}`;
  } else if (phase) {
    pill.textContent = `Phase ${phase.id}: ${phase.name}`;
    pill.style.background = `${phase.color}18`;
    pill.style.color = phase.color;
    const wip = getWeekInPhase(today, phase);
    const totalPlanWeeks = 55;
    const phaseWeekMon = mondayOf(startOfDay(new Date(phase.start)));
    const overallWeek = Math.floor((today - mondayOf(TRAIN_START)) / (7*86400000)) + 1;
    right.textContent = `Week ${Math.min(overallWeek,55)} of 55 · ${phase.hrs}`;
  } else if (today >= RACE_DATE) {
    pill.textContent = 'Race Complete!';
    pill.style.background = 'rgba(252,76,2,.12)';
    pill.style.color = '#FC4C02';
  }
}

function renderProgress() {
  const total = RACE_DATE - TRAIN_START;
  const elapsed = Math.min(Math.max(today - TRAIN_START, 0), total);
  const pct = (elapsed / total * 100).toFixed(2);
  document.getElementById('prog-fill').style.width = pct + '%';
}

function renderHero() {
  const el = document.getElementById('hero');

  // ── PRE-TRAINING ──
  if (today < TRAIN_START) {
    const days = daysUntil(TRAIN_START);
    // Build first week preview
    const w1Mon = mondayOf(TRAIN_START);
    let previewRows = '';
    const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    for (let i=0; i<7; i++) {
      const d = addDays(w1Mon, i);
      const act = getActivity(d);
      if (!act) {
        previewRows += `<div class="preview-row"><span class="preview-day">${dayNames[i]}</span><span class="preview-dot" style="background:var(--border)"></span><span class="preview-label" style="color:var(--mid)">Pre-training</span></div>`;
        continue;
      }
      const sc = sportStyle(act.type);
      const dur = fmtDuration(act.duration);
      previewRows += `
        <div class="preview-row">
          <span class="preview-day">${dayNames[i]}</span>
          <span class="preview-dot" style="background:${sc.color}"></span>
          <span class="preview-label">${act.label}</span>
          ${dur ? `<span class="preview-dur">${dur}</span>` : ''}
        </div>`;
    }

    el.innerHTML = `
      <div class="pretrain-card">
        <div class="pretrain-left">
          <div class="pretrain-eyebrow">Training begins in</div>
          <span class="pretrain-num">${days}</span>
          <span class="pretrain-unit">${days === 1 ? 'Day' : 'Days'}</span>
          <div class="pretrain-date">${fmtDate(TRAIN_START, {weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div>
        </div>
        <div class="pretrain-right">
          <div>
            <div class="pretrain-phase-name">Phase 1: Foundation</div>
            <div class="pretrain-phase-sub">5–7 hrs/wk · June 12 – August 20, 2026<br>Swim 3× / Bike 2× / Run 2× · Establish the base</div>
          </div>
          <div>
            <div style="font-size:.62rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--mid);margin-bottom:.5rem;">Week 1 Preview</div>
            <div class="pretrain-week-preview">${previewRows}</div>
          </div>
        </div>
      </div>`;
    return;
  }

  // ── RACE DAY ──
  if (dateStr(today) === dateStr(RACE_DATE)) {
    el.innerHTML = `<div class="active-card" style="border:2px solid var(--orange);">
      <div>
        <div class="active-eyebrow">Today</div>
        <div class="active-badge" style="color:var(--orange);background:var(--orange-dim);">RACE DAY</div>
        <div class="active-session">70.3 Half-Ironman · Montréal</div>
        <div class="active-meta">
          <span>1.9 km swim</span><span>90 km bike</span><span>21.1 km run</span>
        </div>
      </div>
      <div class="active-right">
        <div class="active-duration" style="color:var(--orange);">~6h</div>
        <div class="active-dur-label">Target</div>
      </div>
    </div>`;
    return;
  }

  // ── ACTIVE TRAINING ──
  // Find today's or next activity
  let actDate = today;
  let act = getActivity(today);
  let label = 'Today';

  if (!act || act.type === 'rest') {
    // Look ahead for next non-rest activity
    for (let i=1; i<=7; i++) {
      const d = addDays(today, i);
      const a = getActivity(d);
      if (a && a.type !== 'rest') {
        act = a; actDate = d;
        label = i === 1 ? 'Tomorrow' : fmtDate(d, {weekday:'long'});
        break;
      }
    }
  }

  if (!act) {
    el.innerHTML = `<div class="active-card"><div><div class="active-eyebrow">Rest Week</div><div class="active-session">No training scheduled this period.</div></div></div>`;
    return;
  }

  const sc = sportStyle(act.type);
  const dur = fmtDuration(act.duration);
  const phase = getPhaseForDate(actDate);
  const phaseName = phase ? `Phase ${phase.id}: ${phase.name}` : '';

  // If today is rest but we show next activity — also show what today is
  const todayAct = getActivity(today);
  const todayIsRest = !todayAct || todayAct.type === 'rest';

  el.innerHTML = `
    <div class="active-card">
      <div>
        <div class="active-eyebrow">${label}${todayIsRest && label !== 'Today' ? ' · Today is rest' : ''}</div>
        <div class="active-badge" style="color:${sc.color};background:${sc.dim};">${sc.badge}</div>
        <div class="active-session">${act.label}</div>
        <div class="active-meta">
          ${dur ? `<span>${dur}</span>` : ''}
          ${phaseName ? `<span>${phaseName}</span>` : ''}
        </div>
      </div>
      ${dur ? `<div class="active-right">
        <div class="active-duration">${dur}</div>
        <div class="active-dur-label">Duration</div>
      </div>` : ''}
    </div>`;
}

function renderTimeline() {
  const wrap = document.getElementById('timeline-wrap');
  const totalMs = RACE_DATE - TRAIN_START;
  const segments = PHASES.map(p => {
    const ps = startOfDay(new Date(p.start));
    const pe = startOfDay(new Date(p.end));
    const ms = pe - ps;
    return { ...p, pct: (ms/totalMs*100).toFixed(1) };
  });

  const activePhase = getPhaseForDate(today);
  const labelRow = segments.map(s =>
    `<div class="timeline-seg-label" style="text-align:center;">${s.name}</div>`).join('');
  const barRow = segments.map(s =>
    `<div class="tseg ${activePhase && activePhase.id===s.id?'t-active':''}" title="${s.name}" style="background:${s.color}${activePhase && activePhase.id===s.id?'':'80'};"></div>`
  ).join('');

  wrap.innerHTML = `
    <div class="timeline-label-row">${labelRow}</div>
    <div class="timeline-bar">${barRow}</div>`;
}

function renderWeekStrip() {
  const mon = mondayOf(today);
  const grid = document.getElementById('week-grid');
  const title = document.getElementById('week-title');
  const meta  = document.getElementById('week-meta');

  const dayNames = ['M','T','W','T','F','S','S'];
  const fullDayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let html = '';
  let totalMin = 0;

  for (let i=0; i<7; i++) {
    const d = addDays(mon, i);
    const isToday = dateStr(d) === dateStr(today);
    const isPast  = d < today && !isToday;
    const act     = getActivity(d);
    const isPreTrain = d < TRAIN_START;

    let cls = 'day-cell';
    if (isToday)   cls += ' is-today';
    if (isPast)    cls += ' is-past';
    if (isPreTrain)cls += ' pretrain-day';

    let badgeHtml = '';
    let sessionHtml = '';
    if (act && !isPreTrain) {
      const sc = sportStyle(act.type);
      badgeHtml = `<span class="day-sport-badge" style="color:${sc.color};background:${sc.dim};">${sc.badge}</span>`;
      sessionHtml = `<span class="day-session-lbl">${act.label}</span>`;
      if (act.duration) totalMin += act.duration;
    } else if (isPreTrain) {
      badgeHtml = `<span class="day-sport-badge" style="color:var(--mid);background:var(--bg);">—</span>`;
    } else {
      badgeHtml = `<span class="day-sport-badge" style="color:var(--border);background:var(--bg);">—</span>`;
    }

    html += `
      <div class="${cls}">
        <span class="day-name-lbl">${fullDayNames[i]}</span>
        <span class="day-num-lbl">${d.getDate()}</span>
        ${badgeHtml}
        ${sessionHtml}
      </div>`;
  }

  grid.innerHTML = html;

  const sun = addDays(mon, 6);
  const startFmt = fmtDate(mon, {month:'short',day:'numeric'});
  const endFmt   = fmtDate(sun, {month:'short',day:'numeric'});
  title.textContent = `Week of ${startFmt}`;

  if (totalMin > 0) {
    meta.textContent = fmtDuration(totalMin) + ' total';
  } else if (today < TRAIN_START) {
    meta.textContent = 'Pre-training';
  }
}

function renderCalendar() {
  const monthTitle = document.getElementById('cal-month-name');
  const grid       = document.getElementById('cal-grid');
  const legend     = document.getElementById('cal-legend');

  const firstOfMonth = new Date(calYear, calMonth, 1);
  const firstMon = mondayOf(firstOfMonth);
  monthTitle.textContent = fmtMonthYear(firstOfMonth);

  // Build 5-6 weeks
  let html = '';
  let d = startOfDay(firstMon);
  const typesInMonth = new Set();

  for (let w=0; w<6; w++) {
    for (let i=0; i<7; i++) {
      const isCurrentMonth = d.getMonth() === calMonth && d.getFullYear() === calYear;
      const isToday  = dateStr(d) === dateStr(today);
      const isPreTrain = d < TRAIN_START;
      const isFuture = d > RACE_DATE;
      const act = getActivity(d);
      const ds  = dateStr(d);
      const isRaceEvent = !!RACE_EVENTS[ds];

      let cls = 'cal-day';
      if (!isCurrentMonth) cls += ' other-mo';
      if (isToday) cls += ' is-today';
      if ((isPreTrain || isFuture) && isCurrentMonth) cls += ' is-pretrain';
      if (act) { cls += ' has-act'; typesInMonth.add(act.type); }

      let dotHtml = '';
      let durHtml = '';
      let flagHtml = '';
      let tipHtml  = '';

      if (act && isCurrentMonth) {
        const sc = sportStyle(act.type);
        dotHtml = `<div class="cal-dot" style="background:${sc.color};"></div>`;
        const dur = fmtDuration(act.duration);
        if (dur) durHtml = `<span class="cal-dur">${dur}</span>`;
        tipHtml = `<div class="cal-tip">${act.label}${dur ? ' · '+dur : ''}</div>`;
      }
      if (isRaceEvent) flagHtml = `<div class="cal-flag">🏁</div>`;

      html += `<div class="${cls}">${flagHtml}<span class="cal-day-num">${d.getDate()}</span>${dotHtml}${durHtml}${tipHtml}</div>`;
      d = addDays(d, 1);
    }
    // Stop if we've passed into the next month for 2 rows
    if (d.getMonth() !== calMonth && d.getFullYear() === calYear + (calMonth===11?1:0) && w >= 4) break;
  }
  grid.innerHTML = html;

  // Legend
  const sportOrder = ['run','swim','bike','brick','race','rest'];
  let legHtml = '';
  for (const t of sportOrder) {
    if (typesInMonth.has(t) && t !== 'rest') {
      const sc = sportStyle(t);
      legHtml += `<div class="leg-item"><div class="leg-dot" style="background:${sc.color};"></div>${sc.label}</div>`;
    }
  }
  if (typesInMonth.has('rest')) {
    legHtml += `<div class="leg-item"><div class="leg-dot" style="background:#9CA3AF;"></div>Rest</div>`;
  }
  if (!legHtml) {
    legHtml = `<div class="leg-item" style="font-style:italic;">No training this month</div>`;
  }
  legend.innerHTML = legHtml;
}

function init() {
  renderNav();
  renderRaceHeader();
  renderProgress();
  renderHero();
  renderTimeline();
  renderWeekStrip();
  renderCalendar();

  document.getElementById('cal-prev').addEventListener('click', () => {
    calMonth--; if (calMonth < 0) { calMonth=11; calYear--; }
    renderCalendar();
  });
  document.getElementById('cal-next').addEventListener('click', () => {
    calMonth++; if (calMonth > 11) { calMonth=0; calYear++; }
    renderCalendar();
  });
}

init();
</script>
</body>
</html>
